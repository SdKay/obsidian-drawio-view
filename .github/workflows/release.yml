name: Release

# Trigger on any tag push — tag name should match the version in manifest.json
# e.g.  git tag 0.0.1 && git push origin 0.0.1
on:
  push:
    tags:
      - '*'

permissions:
  contents: write      # needed to create a GitHub Release
  id-token: write      # needed to obtain OIDC token for attestation
  attestations: write  # needed to store the attestation

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + all tags needed for git log between tags

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate changelog
        id: changelog
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          RANGE="${PREV:+${PREV}..}HEAD"

          extract() {
            git log $RANGE --pretty=format:"- %s" | grep -E "^- $1" || true
          }

          FEAT=$(extract "feat")
          FIX=$(extract "fix")
          PERF=$(extract "perf")
          REF=$(extract "refactor")
          DOCS=$(extract "docs")
          OTHER=$(git log $RANGE --pretty=format:"- %s" \
            | grep -Ev "^- (feat|fix|perf|refactor|docs|chore|build|ci|Merge)" || true)

          BODY=""
          [ -n "$FEAT" ]  && BODY+=$'## 🚀 Features\n'"$FEAT"$'\n\n'
          [ -n "$FIX" ]   && BODY+=$'## 🐛 Bug fixes\n'"$FIX"$'\n\n'
          [ -n "$PERF" ]  && BODY+=$'## ⚡ Performance\n'"$PERF"$'\n\n'
          [ -n "$REF" ]   && BODY+=$'## ♻️ Refactor\n'"$REF"$'\n\n'
          [ -n "$DOCS" ]  && BODY+=$'## 📝 Documentation\n'"$DOCS"$'\n\n'
          [ -n "$OTHER" ] && BODY+=$'## 🔧 Other changes\n'"$OTHER"$'\n\n'

          if [ -n "$PREV" ]; then
            REPO="${{ github.repository }}"
            BODY+="**Full changelog**: https://github.com/${REPO}/compare/${PREV}...${{ github.ref_name }}"
          fi

          {
            echo 'body<<EOF'
            echo "$BODY"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          # Attach the three files required by Obsidian plugin installations.
          # GitHub automatically adds "Source code (zip)" and "(tar.gz)" to
          # every release — no extra step needed.
          files: |
            main.js
            manifest.json
            styles.css
