name: Release

# Trigger on any tag push — tag name should match the version in manifest.json
# e.g.  git tag 0.0.1 && git push origin 0.0.1
on:
  push:
    tags:
      - '*'

permissions:
  contents: write   # needed to create a GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Release name = tag name (e.g. "0.0.1")
          name: ${{ github.ref_name }}
          # Attach the three files required by Obsidian plugin installations.
          # GitHub automatically adds "Source code (zip)" and "(tar.gz)" to
          # every release — no extra step needed.
          files: |
            main.js
            manifest.json
            styles.css
